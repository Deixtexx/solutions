name: Practice 2026 CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'practice2026/**' # Запуск только при изменениях в этой папке

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
          cache: true

      - name: Restore dependencies
        run: dotnet restore practice2026/

      - name: Build
        run: dotnet build practice2026/ --no-restore --configuration Release

      - name: Run xUnit Tests
        run: dotnet test practice2026/ --no-build --configuration Release
