name: Practice 2026 CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'practice2026/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Restore Dependencies
        run: dotnet restore practice2026/ -c ${{ github.head_ref || github.ref_name }}

      - name: Build Solution
        run: dotnet build practice2026/ -c ${{ github.head_ref || github.ref_name }} --no-restore

      - name: Run Tests
        run: dotnet test practice2026/ -c ${{ github.head_ref || github.ref_name }} --no-build


