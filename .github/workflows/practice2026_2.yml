name: Practice 2026 2 CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'practice2026_2/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Restore
        run: dotnet restore practice2026_2/

      - name: Build
        run: dotnet build practice2026_2/ --no-restore

      - name: Test
        run: dotnet test practice2026_2/ --no-build

